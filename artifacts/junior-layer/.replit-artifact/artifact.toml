kind = "web"
previewPath = "/"
title = "Junior Layer"
version = "1.0.0"
id = "artifacts/junior-layer"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23263

[services.development]
run = "pnpm --filter @workspace/junior-layer run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/junior-layer", "run", "build" ]
publicDir = "artifacts/junior-layer/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23263"
BASE_PATH = "/"
